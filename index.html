<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K12HSN Spin The Wheel</title>
    <style>
        :root {
            /* K12HSN Color Palette */
            --primary-blue: #0A3D70; 
            --secondary-blue: #1C65A1;
            --accent-gold: #FDBA12; 
            --accent-gold-hover: #E3A302;
            --bg-page: #F4F6F9;
            --bg-panel: #FFFFFF;
            --text-dark: #2C3E50;
            --text-muted: #7F8C8D;
            --border: #E0E6ED;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }
        
        /* Sidebars */
        .sidebar {
            width: 340px;
            background-color: var(--bg-panel);
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
        }
        .sidebar.left { border-right: 2px solid var(--border); box-shadow: 4px 0 15px rgba(0,0,0,0.03); }
        .sidebar.right { border-left: 2px solid var(--border); box-shadow: -4px 0 15px rgba(0,0,0,0.03); }
        
        /* Branding Header */
        .brand-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }
        .brand-logo { max-width: 80%; height: auto; max-height: 80px; }
        
        h3 { margin: 0 0 15px 0; color: var(--primary-blue); font-size: 16px; letter-spacing: 1px; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--secondary-blue); }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: all 0.2s ease; }
        
        .btn-add { background: var(--secondary-blue); color: white; padding: 10px 16px; font-size: 15px; }
        .btn-add:hover { background: var(--primary-blue); }
        
        .btn-del { background: #ff4757; color: white; padding: 6px 12px; font-size: 16px; border-radius: 4px; }
        .btn-del:hover { background: #ff6b81; }

        .btn-readd { background: var(--border); color: var(--text-dark); padding: 6px 10px; font-size: 12px; text-transform: uppercase; }
        .btn-readd:hover { background: var(--secondary-blue); color: white; }

        /* Bottom Action Buttons Container */
        .action-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
        }

        .btn-spin, .btn-continue {
            font-size: 22px;
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }

        .btn-spin {
            background: var(--accent-gold);
            color: var(--primary-blue);
            box-shadow: 0 4px 15px rgba(253, 186, 18, 0.3);
        }
        .btn-spin:hover:not(:disabled) { background: var(--accent-gold-hover); transform: translateY(-2px); }
        .btn-spin:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-continue {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 15px rgba(10, 61, 112, 0.3);
            display: none; /* Hidden until a prize is won */
        }
        .btn-continue:hover { background: var(--secondary-blue); transform: translateY(-2px); }

        /* Item Lists */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .item-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 500;
        }
        .item-actions { display: flex; align-items: center; gap: 8px; }
        
        .qty-input {
            width: 50px;
            padding: 6px;
            border: 2px solid var(--border);
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: var(--primary-blue);
        }
        .qty-input:focus { outline: none; border-color: var(--secondary-blue); }

        /* Center Wheel Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }
        
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 85vh; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--primary-blue);
            z-index: 20;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(10, 61, 112, 0.15);
            transition: transform 5s cubic-bezier(0.1, 0.7, 0.1, 1);
            will-change: transform; 
        }

        /* MASSIVE Winner Overlay */
        .winner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 61, 112, 0.90);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(8px);
        }
        .winner-overlay.active { opacity: 1; pointer-events: auto; }
        
        .winner-box {
            background: var(--bg-panel);
            padding: 80px 140px; /* Made significantly larger */
            border-radius: 20px;
            text-align: center;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-top: 12px solid var(--accent-gold);
            border-bottom: 12px solid var(--primary-blue);
        }
        .winner-overlay.active .winner-box { transform: scale(1); }
        .winner-title { font-size: 28px; margin-bottom: 15px; color: var(--text-muted); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .winner-name { font-size: 96px; font-weight: 900; margin: 0; color: var(--primary-blue); text-transform: uppercase; text-shadow: 3px 3px 0px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar left">
    <div class="brand-header">
        <img src="https://logo.clearbit.com/k12hsn.org" alt="K12HSN Logo" class="brand-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <h2 style="display:none; margin:0; color: var(--primary-blue); font-size: 28px;">K12HSN</h2>
    </div>

    <h3>WHEEL SETTINGS</h3>
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Add an item..." autocomplete="off">
        <button class="btn-add" id="addBtn">ADD</button>
    </div>
    <ul class="item-list" id="itemList"></ul>
    
    <div class="action-container">
        <button class="btn-spin" id="spinBtn">SPIN WHEEL</button>
        <button class="btn-continue" id="continueBtn">CONTINUE</button>
    </div>
</div>

<div class="main-content">
    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-box">
            <div class="winner-title">🎉 WINNER 🎉</div>
            <div class="winner-name" id="winnerName">ITEM</div>
            </div>
    </div>
    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel"></canvas>
    </div>
</div>

<div class="sidebar right">
    <div style="height: 110px;"></div> 
    <h3>WINNERS HISTORY</h3>
    <ul class="item-list" id="historyList"></ul>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let items = [
            { name: "Backpack", qty: 2 },
            { name: "Chromebook", qty: 1 },
            { name: "Gift Card", qty: 5 },
            { name: "Sticker Pack", qty: 10 }
        ];
        
        let wonHistory = []; 
        let pendingWinnerIndex = -1; 

        const colors = [
            "#3498DB", "#E74C3C", "#2ECC71", "#F1C40F", 
            "#9B59B6", "#E67E22", "#1ABC9C", "#34495E", 
            "#D35400", "#27AE60", "#2980B9", "#8E44AD"
        ];
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const itemList = document.getElementById('itemList');
        const historyList = document.getElementById('historyList');
        const itemInput = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const spinBtn = document.getElementById('spinBtn');
        const continueBtn = document.getElementById('continueBtn');
        const winnerOverlay = document.getElementById('winnerOverlay');
        const winnerName = document.getElementById('winnerName');

        let currentRotation = 0;
        let isSpinning = false;
        
        canvas.width = 1000;
        canvas.height = 1000;

        // --- AUDIO SYSTEM (Web Audio API Synthesizer) ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Mechanical clicking sound for the wheel
        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime); // Deep click
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Fanfare chord for the winner
        function playTada() {
            if (!audioCtx) return;
            // Notes for a celebratory chord (G4, C5, E5, G5)
            const notes = [
                { f: 392.00, d: 0.1 }, 
                { f: 523.25, d: 0.1 }, 
                { f: 659.25, d: 0.1 }, 
                { f: 783.99, d: 1.0 }  // Held final note
            ];
            
            let time = audioCtx.currentTime;
            notes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = note.f;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + note.d);
                osc.start(time);
                osc.stop(time + note.d);
                time += note.d; // staggered entrance
            });
        }

        function simulateTicks() {
            let delay = 30; // Start fast
            let elapsed = 0;
            const duration = 5000; // Match the 5s CSS transition
            
            function tick() {
                playTick();
                elapsed += delay;
                // Gradually increase the delay to simulate friction slowing down the wheel
                delay = 30 + Math.pow(elapsed / duration, 3) * 400; 
                if (elapsed < duration) {
                    setTimeout(tick, delay);
                }
            }
            tick();
        }
        // ------------------------------------------------

        function render() {
            itemList.innerHTML = '';
            items.forEach((item, i) => {
                const li = document.createElement('li');
                
                const span = document.createElement('span');
                span.textContent = item.name;
                span.style.overflow = "hidden";
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'item-actions';
                
                const qtyInput = document.createElement('input');
                qtyInput.type = 'number';
                qtyInput.className = 'qty-input';
                qtyInput.value = item.qty;
                qtyInput.min = 1;
                qtyInput.onchange = (e) => {
                    let val = parseInt(e.target.value);
                    if (isNaN(val) || val < 1) val = 1;
                    item.qty = val;
                    render(); 
                };
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-del';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = () => {
                    if (!isSpinning) {
                        items.splice(i, 1);
                        render();
                    }
                };

                actionsDiv.appendChild(qtyInput);
                actionsDiv.appendChild(delBtn);
                li.appendChild(span);
                li.appendChild(actionsDiv);
                itemList.appendChild(li);
            });

            historyList.innerHTML = '';
            wonHistory.forEach((histItem, i) => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = histItem.name;
                
                const readdBtn = document.createElement('button');
                readdBtn.className = 'btn-readd';
                readdBtn.innerHTML = '＋ Re-add';
                readdBtn.onclick = () => {
                    if (!isSpinning) {
                        let existing = items.find(itm => itm.name === histItem.name);
                        if(existing) { existing.qty++; } 
                        else { items.push({ name: histItem.name, qty: 1 }); }
                        wonHistory.splice(i, 1);
                        render();
                    }
                };

                li.appendChild(span);
                li.appendChild(readdBtn);
                historyList.appendChild(li);
            });

            spinBtn.disabled = items.length < 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 10; 

            if (items.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = "#E0E6ED";
                ctx.fill();
                return;
            }

            const sliceAngle = (2 * Math.PI) / items.length;

            for (let i = 0; i < items.length; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold " + (items.length > 12 ? "28px" : "38px") + " 'Segoe UI', sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 4;
                
                let displayText = items[i].name;
                if (displayText.length > 12) {
                    displayText = displayText.substring(0, 10) + "...";
                }
                displayText += ` (x${items[i].qty})`;
                
                ctx.fillText(displayText, radius - 40, 12); 
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, 35, 0, 2 * Math.PI);
            ctx.fillStyle = "#0A3D70"; 
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#FDBA12"; 
            ctx.stroke();
        }

        // --- Event Listeners ---
        function addItem() {
            const text = itemInput.value.trim();
            if (text && !isSpinning) {
                items.push({ name: text, qty: 1 });
                itemInput.value = '';
                render();
            }
        }

        addBtn.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });

        spinBtn.addEventListener('click', () => {
            if (isSpinning || items.length < 2) return;
            
            initAudio(); // Required to unlock audio context in the browser
            simulateTicks(); // Start the ticking sound effect

            isSpinning = true;
            spinBtn.disabled = true;
            winnerOverlay.classList.remove('active');

            const sliceAngle = 360 / items.length;
            const pickedIndex = Math.floor(Math.random() * items.length);
            
            const targetAngle = 360 - (pickedIndex * sliceAngle) - (sliceAngle / 2) - 90;
            const extraSpins = 360 * 5;
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                // Display Winner
                winnerName.textContent = items[pickedIndex].name;
                winnerOverlay.classList.add('active');
                
                playTada(); // Play celebratory sound
                
                pendingWinnerIndex = pickedIndex; 
                isSpinning = false;
                
                // Swap the spin button out for the continue button!
                spinBtn.style.display = 'none';
                continueBtn.style.display = 'block';
                
            }, 5000); 
        });

        // The new Continue logic located directly under the mouse
        continueBtn.addEventListener('click', () => {
            winnerOverlay.classList.remove('active');
            
            if (pendingWinnerIndex !== -1) {
                let wonItem = items[pendingWinnerIndex];
                
                wonHistory.unshift({ name: wonItem.name });
                wonItem.qty--;

                if (wonItem.qty <= 0) {
                    items.splice(pendingWinnerIndex, 1);
                }
                
                pendingWinnerIndex = -1;
                render(); 
            }

            // Swap buttons back to original state
            continueBtn.style.display = 'none';
            spinBtn.style.display = 'block';
            spinBtn.disabled = items.length < 2;
        });

        render();
    });
</script>

</body>
</html>
