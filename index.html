<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Spin The Wheel - With History</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #fff;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }
        
        /* Sidebars (Left and Right) */
        .sidebar {
            width: 320px;
            background-color: #2a2a40;
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
        }
        .sidebar.left { box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        .sidebar.right { box-shadow: -4px 0 15px rgba(0,0,0,0.5); }
        
        h2 { margin-top: 0; color: #fff; text-align: center; letter-spacing: 1px; font-size: 20px; }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            width: 100%;
        }
        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        
        /* Button Styles */
        .btn-add { background: #00E676; color: #111; padding: 12px 18px; font-size: 16px; }
        .btn-add:hover { background: #00C853; }
        
        .btn-del { background: #ff5252; color: white; padding: 6px 12px; font-size: 16px; }
        .btn-del:hover { background: #ff1744; }

        .btn-readd { background: #40C4FF; color: #111; padding: 6px 10px; font-size: 14px; text-transform: uppercase; }
        .btn-readd:hover { background: #00B0FF; }

        .btn-spin {
            background: #FF4081;
            color: white;
            font-size: 22px;
            padding: 18px;
            margin-top: auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
        }
        .btn-spin:hover:not(:disabled) { background: #F50057; transform: translateY(-2px); }
        .btn-spin:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Lists */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            overflow-y: auto;
            flex-grow: 1;
            background: #191927;
            border-radius: 6px;
            border: 1px solid #3f3f5a;
        }
        .item-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #3f3f5a;
            font-size: 16px;
            word-break: break-word;
        }
        .item-list li:last-child { border-bottom: none; }
        .item-actions { display: flex; gap: 8px; }

        /* Right Side Wheel Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            background: radial-gradient(circle at center, #2a2a40 0%, #1e1e2f 100%);
        }
        
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 85vh; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #FF4081;
            z-index: 20;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }
        
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: transform 5s cubic-bezier(0.1, 0.7, 0.1, 1);
            will-change: transform; 
        }

        /* Cinematic Winner Overlay */
        .winner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(5px);
        }
        .winner-overlay.active { opacity: 1; pointer-events: auto; }
        
        .winner-box {
            background: linear-gradient(135deg, #FF4081, #7C4DFF);
            padding: 50px 80px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .winner-overlay.active .winner-box { transform: scale(1); }
        .winner-title { font-size: 24px; margin-bottom: 10px; color: #FFF0F5; letter-spacing: 2px; }
        .winner-name { font-size: 72px; font-weight: bold; margin: 0; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        
        .btn-close {
            margin-top: 40px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 40px;
            font-size: 20px;
            border-radius: 30px;
        }
        .btn-close:hover { background: rgba(255,255,255,0.35); }
    </style>
</head>
<body>

<div class="sidebar left">
    <h2>WHEEL SETTINGS</h2>
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Add an item..." autocomplete="off">
        <button class="btn-add" id="addBtn">ADD</button>
    </div>
    <ul class="item-list" id="itemList"></ul>
    <button class="btn-spin" id="spinBtn">SPIN WHEEL</button>
</div>

<div class="main-content">
    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-box">
            <div class="winner-title">🎉 WE HAVE A WINNER 🎉</div>
            <div class="winner-name" id="winnerName">ITEM</div>
            <button class="btn-close" id="closeWinnerBtn">CONTINUE</button>
        </div>
    </div>
    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel"></canvas>
    </div>
</div>

<div class="sidebar right">
    <h2>WINNERS HISTORY</h2>
    <ul class="item-list" id="historyList">
        </ul>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // State Management
        let items = ["Pizza", "Burgers", "Tacos", "Sushi", "Salad"];
        let wonItems = []; // Array to track winners
        let pendingWinnerIndex = -1; // Tracks the item currently being displayed as the winner

        const colors = [
            "#FF5252", "#FF4081", "#E040FB", "#7C4DFF", 
            "#536DFE", "#448AFF", "#40C4FF", "#18FFFF", 
            "#64FFDA", "#69F0AE", "#B2FF59", "#EEFF41", 
            "#FFD740", "#FFAB40", "#FF6E40"
        ];
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const itemList = document.getElementById('itemList');
        const historyList = document.getElementById('historyList');
        const itemInput = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const spinBtn = document.getElementById('spinBtn');
        const winnerOverlay = document.getElementById('winnerOverlay');
        const winnerName = document.getElementById('winnerName');
        const closeWinnerBtn = document.getElementById('closeWinnerBtn');

        let currentRotation = 0;
        let isSpinning = false;

        canvas.width = 1200;
        canvas.height = 1200;

        function render() {
            // 1. Render Left Sidebar List (Active Items)
            itemList.innerHTML = '';
            items.forEach((item, i) => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = item;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-del';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = () => {
                    if (!isSpinning) {
                        items.splice(i, 1);
                        render();
                    }
                };

                li.appendChild(span);
                li.appendChild(delBtn);
                itemList.appendChild(li);
            });

            // 2. Render Right Sidebar List (History Items)
            historyList.innerHTML = '';
            wonItems.forEach((item, i) => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = item;
                
                const readdBtn = document.createElement('button');
                readdBtn.className = 'btn-readd';
                readdBtn.innerHTML = '＋ Re-add';
                readdBtn.onclick = () => {
                    if (!isSpinning) {
                        wonItems.splice(i, 1); // Remove from history
                        items.push(item);      // Add back to wheel
                        render();
                    }
                };

                li.appendChild(span);
                li.appendChild(readdBtn);
                historyList.appendChild(li);
            });

            // Prevent spinning if less than 2 items
            spinBtn.disabled = items.length < 2;

            // 3. Draw the Wheel on Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 10; 

            if (items.length === 0) {
                // Draw empty wheel placeholder if no items
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = "#191927";
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = "#3f3f5a";
                ctx.stroke();
                return;
            }

            const sliceAngle = (2 * Math.PI) / items.length;

            for (let i = 0; i < items.length; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                ctx.lineWidth = 6;
                ctx.strokeStyle = "#1e1e2f";
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold " + (items.length > 15 ? "35px" : "55px") + " 'Segoe UI', sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.6)";
                ctx.shadowBlur = 6;
                
                let displayText = items[i];
                if (displayText.length > 14) {
                    displayText = displayText.substring(0, 12) + "...";
                }
                
                ctx.fillText(displayText, radius - 50, 18); 
                ctx.restore();
            }

            // Draw center hub
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#1e1e2f";
            ctx.stroke();
        }

        // --- Interaction Logic ---
        function addItem() {
            const text = itemInput.value.trim();
            if (text && !isSpinning) {
                items.push(text);
                itemInput.value = '';
                render();
            }
        }

        addBtn.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        // Handle dismissing the winner popup
        closeWinnerBtn.addEventListener('click', () => {
            winnerOverlay.classList.remove('active');
            
            // Move the won item from the wheel to the history list
            if (pendingWinnerIndex !== -1) {
                const wonItem = items.splice(pendingWinnerIndex, 1)[0];
                wonItems.unshift(wonItem); // Add to the TOP of the history list
                pendingWinnerIndex = -1;
                render(); // Redraw the wheel without the won item
            }
        });

        spinBtn.addEventListener('click', () => {
            if (isSpinning || items.length < 2) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            winnerOverlay.classList.remove('active');

            const sliceAngle = 360 / items.length;
            const pickedIndex = Math.floor(Math.random() * items.length);
            
            const targetAngle = 360 - (pickedIndex * sliceAngle) - (sliceAngle / 2) - 90;
            
            const extraSpins = 360 * 5;
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                winnerName.textContent = items[pickedIndex];
                winnerOverlay.classList.add('active');
                
                // Store the index so we can remove it AFTER they close the popup
                pendingWinnerIndex = pickedIndex; 
                
                isSpinning = false;
                spinBtn.disabled = false;
            }, 5000); 
        });

        // Initial setup render
        render();
    });
</script>

</body>
</html>
