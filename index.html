<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26-27 Fiscal Year Vacation Planner</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5em; color: #1a365d; }
        
        .controls { display: flex; gap: 20px; align-items: center; background: #e2e8f0; padding: 15px 20px; border-radius: 8px; }
        .input-group { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .input-group input { padding: 8px; width: 60px; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1em; }
        
        .status { font-size: 1.2em; font-weight: bold; padding: 8px 15px; border-radius: 6px; background: #c6f6d5; color: #22543d; }
        .status.zero { background: #fed7d7; color: #822727; }

        .legend { display: flex; gap: 15px; margin-bottom: 20px; font-size: 0.9em; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #ccc; }
        .box.available { background: white; }
        .box.weekend { background: #f1f5f9; }
        .box.holiday { background: #fee2e2; border-color: #fca5a5; }
        .box.selected { background: #3b82f6; border-color: #2563eb; }

        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .month-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
        .month-title { text-align: center; font-weight: bold; margin-bottom: 10px; color: #2d3748; }
        
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.8em; font-weight: bold; color: #718096; margin-bottom: 5px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.9em; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; transition: all 0.1s; }
        .day:hover:not(.disabled) { border-color: #a0aec0; background-color: #ebf8ff; }
        
        .day.empty { border: none; background: transparent; cursor: default; }
        .day.disabled { background-color: #f1f5f9; color: #a0aec0; cursor: not-allowed; }
        .day.holiday { background-color: #fee2e2; color: #b91c1c; font-weight: bold; border-color: #fecaca; }
        .day.selected { background-color: #3b82f6; color: white; border-color: #2563eb; font-weight: bold; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3); }

        .summary-panel { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .summary-panel h2 { margin-top: 0; font-size: 1.2em; color: #2d3748; }
        #selected-dates-list { display: flex; flex-wrap: wrap; gap: 10px; list-style: none; padding: 0; margin: 0; }
        #selected-dates-list li { background: #ebf4ff; border: 1px solid #bfdbfe; color: #1e3a8a; padding: 5px 12px; border-radius: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1>🗓️ Vacation Planner (2026-2027 Fiscal Year)</h1>
        <div class="controls">
            <div class="input-group">
                <label for="total-days">Total Vacation Days:</label>
                <input type="number" id="total-days" value="15" min="0" onchange="updateCounter()">
            </div>
            <div id="status-badge" class="status">Remaining: <span id="remaining-days">15</span></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box available"></div> Available Workday</div>
        <div class="legend-item"><div class="box weekend"></div> Weekend</div>
        <div class="legend-item"><div class="box holiday"></div> ICOE Holiday</div>
        <div class="legend-item"><div class="box selected"></div> Selected Vacation</div>
    </div>

    <div id="calendar-container" class="calendar-grid">
        </div>

    <div class="summary-panel">
        <h2>Selected Vacation Dates</h2>
        <ul id="selected-dates-list">
            <li style="background: none; border: none; color: #718096;">No days selected yet.</li>
        </ul>
    </div>
</div>

<script>
    // ICOE Blocked Holidays based on 2026-2027 Calendar Document
    const holidays = [
        '2026-07-03', // Independence Day Obs
        '2026-09-07', // Labor Day
        '2026-11-11', // Veteran's Day
        '2026-11-26', // Thanksgiving
        '2026-11-27', // Admission's Day Lieu
        '2026-12-24', // Christmas Eve
        '2026-12-25', // Christmas Day
        '2026-12-28', // Winter Break Office Closure
        '2026-12-29', // Winter Break Office Closure
        '2026-12-30', // Winter Break Office Closure
        '2026-12-31', // New Year's Eve
        '2027-01-01', // New Year's Day
        '2027-01-18', // MLK Jr. Day
        '2027-02-08', // Lincoln's Birthday
        '2027-02-15', // President's Day
        '2027-03-26', // Spring Holiday
        '2027-03-29', // Spring Holiday
        '2027-05-31', // Memorial Day
        '2027-06-18'  // Juneteenth
    ];

    const selectedDates = new Set();
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    // Format date as YYYY-MM-DD
    function formatDateString(year, monthIndex, day) {
        const y = year;
        const m = String(monthIndex + 1).padStart(2, '0');
        const d = String(day).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // Format for human reading
    function formatPrettyDate(dateString) {
        const [y, m, d] = dateString.split('-');
        return `${monthNames[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
    }

    function renderCalendar() {
        const container = document.getElementById('calendar-container');
        container.innerHTML = '';

        // Start July (month index 6) 2026
        let currentYear = 2026;
        let startMonthIndex = 6; 

        for (let i = 0; i < 12; i++) {
            let mIndex = (startMonthIndex + i) % 12;
            let y = currentYear + Math.floor((startMonthIndex + i) / 12);
            
            const monthCard = document.createElement('div');
            monthCard.className = 'month-card';
            
            // Month Header
            monthCard.innerHTML = `<div class="month-title">${monthNames[mIndex]} ${y}</div>`;
            
            // Days of week header
            const daysHeader = document.createElement('div');
            daysHeader.className = 'days-header';
            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(day => {
                daysHeader.innerHTML += `<div>${day}</div>`;
            });
            monthCard.appendChild(daysHeader);

            // Days Grid
            const daysGrid = document.createElement('div');
            daysGrid.className = 'days-grid';

            // Get first day of month (0 = Sunday, 1 = Monday...)
            const firstDay = new Date(y, mIndex, 1).getDay();
            // Get total days in month
            const daysInMonth = new Date(y, mIndex + 1, 0).getDate();

            // Pad beginning
            for (let pad = 0; pad < firstDay; pad++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'day empty';
                daysGrid.appendChild(emptyDiv);
            }

            // Fill days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.innerText = day;
                
                const dateString = formatDateString(y, mIndex, day);
                const dayOfWeek = new Date(y, mIndex, day).getDay();
                
                // Determine CSS Classes
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    dayDiv.className = 'day disabled weekend';
                    dayDiv.title = 'Weekend';
                } else if (holidays.includes(dateString)) {
                    dayDiv.className = 'day disabled holiday';
                    dayDiv.title = 'ICOE Holiday';
                } else {
                    dayDiv.className = 'day available';
                    dayDiv.dataset.date = dateString;
                    dayDiv.onclick = () => toggleDate(dateString, dayDiv);
                }

                daysGrid.appendChild(dayDiv);
            }

            monthCard.appendChild(daysGrid);
            container.appendChild(monthCard);
        }
    }

    function toggleDate(dateString, element) {
        const totalInput = document.getElementById('total-days').value;
        const total = parseInt(totalInput) || 0;
        
        if (selectedDates.has(dateString)) {
            // Deselect
            selectedDates.delete(dateString);
            element.classList.remove('selected');
        } else {
            // Select (if we have days left)
            if (selectedDates.size < total) {
                selectedDates.add(dateString);
                element.classList.add('selected');
            } else {
                alert('You have used all available vacation days! Increase your total days to select more.');
                return;
            }
        }
        updateCounter();
    }

    function updateCounter() {
        const totalInput = document.getElementById('total-days').value;
        const total = parseInt(totalInput) || 0;
        const remaining = total - selectedDates.size;
        
        const badge = document.getElementById('status-badge');
        const span = document.getElementById('remaining-days');
        
        span.innerText = remaining;
        
        if (remaining <= 0) {
            badge.classList.add('zero');
            // If user lowered input below current selection, we should handle that gracefully
            if (remaining < 0) {
                alert('Warning: You have selected more days than your total available balance.');
            }
        } else {
            badge.classList.remove('zero');
        }

        updateSummaryList();
    }

    function updateSummaryList() {
        const ul = document.getElementById('selected-dates-list');
        ul.innerHTML = '';
        
        if (selectedDates.size === 0) {
            ul.innerHTML = '<li style="background: none; border: none; color: #718096;">No days selected yet.</li>';
            return;
        }

        // Sort dates chronologically
        const sortedDates = Array.from(selectedDates).sort();
        
        sortedDates.forEach(dateStr => {
            const li = document.createElement('li');
            li.innerText = formatPrettyDate(dateStr);
            ul.appendChild(li);
        });
    }

    // Initialize
    renderCalendar();
    updateCounter();

</script>
</body>
</html>
